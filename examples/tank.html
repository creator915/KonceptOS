<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NES Battle Tank</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; overflow: hidden; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 2px solid #444; }
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; justify-content: center; align-items: center;
  pointer-events: none; z-index: 10;
}
#menu {
  display: flex; flex-direction: column; align-items: center;
  color: #fff; pointer-events: auto; text-align: center;
}
#menu h1 { font-size: 28px; color: #f80; margin-bottom: 20px; text-shadow: 2px 2px #800; }
#menu button {
  font-family: monospace; font-size: 16px; padding: 8px 24px; margin: 6px;
  background: #333; color: #ff0; border: 2px solid #ff0; cursor: pointer;
}
#menu button:hover { background: #550; }
#menu .info { font-size: 11px; color: #888; margin-top: 15px; max-width: 400px; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui-overlay">
  <div id="menu">
    <h1>⬛ NES BATTLE TANK ⬛</h1>
    <button onclick="startGame('single')">1 PLAYER - CAMPAIGN</button>
    <button onclick="startGame('coop')">2 PLAYERS - CO-OP</button>
    <button onclick="startGame('versus')">2 PLAYERS - VERSUS</button>
    <div class="info">
      P1: Arrow Keys + Space (fire) + Z (bomb)<br>
      P2: WASD + X (fire) + Enter (bomb)<br>
      20 Levels · 2 Chapters · Bosses at L10 & L20
    </div>
  </div>
</div>

<script>
// ============================================================
// NES BATTLE TANK - Complete Game
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const NES_W = 480, NES_H = 360;
canvas.width = NES_W;
canvas.height = NES_H;

const TILE_SIZE = 16;
const MAP_COLS = 30;
const MAP_ROWS = 20;
const MAP_OFFSET_Y = 24; // HUD height

// NES-ish Color Palette
const COLORS = {
  bg: '#0f0f0f', brick: '#b53120', steel: '#7c7c7c', water: '#3c5fc4',
  forest: '#1a8b20', ground: '#1c1c1c', player1: '#30b020', player2: '#2090e0',
  enemyLight: '#e0d020', enemyMedium: '#e07020', enemyHeavy: '#d02020',
  boss: '#c020c0', bullet: '#fff', explosion: ['#ff0','#f80','#f40','#800'],
  powerUp: '#0ff', hud: '#fff', hudBg: '#111', shield: '#4af',
  turret: '#a0a0a0'
};

// ============================================================
// AUDIO SYSTEM (Web Audio - NES APU style)
// ============================================================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, duration, type='square', vol=0.08) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxShoot() { playTone(800, 0.08, 'square', 0.06); }
function sfxHit() { playTone(200, 0.15, 'sawtooth', 0.08); }
function sfxExplosion() { playTone(80, 0.3, 'sawtooth', 0.1); playTone(60, 0.4, 'square', 0.05); }
function sfxPowerUp() { playTone(600, 0.1, 'square', 0.06); playTone(900, 0.15, 'square', 0.06); }
function sfxBomb() { playTone(50, 0.5, 'sawtooth', 0.15); }
function sfxBoss() { playTone(100, 0.2, 'triangle', 0.1); }
function sfxLevelUp() {
  [440,554,659,880].forEach((f,i) => {
    setTimeout(() => playTone(f, 0.15, 'square', 0.07), i*100);
  });
}

// ============================================================
// SAVE/LOAD SYSTEM (localStorage = 2KB SRAM equivalent)
// ============================================================
function saveData(data) {
  try { localStorage.setItem('nesTankSave', JSON.stringify(data)); } catch(e) {}
}
function loadData() {
  try {
    const d = localStorage.getItem('nesTankSave');
    return d ? JSON.parse(d) : { highScore: 0, maxLevel: 1 };
  } catch(e) { return { highScore: 0, maxLevel: 1 }; }
}

let savedData = loadData();

// ============================================================
// INPUT SYSTEM
// ============================================================
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

function getP1Input() {
  return {
    up: keys['ArrowUp'], down: keys['ArrowDown'],
    left: keys['ArrowLeft'], right: keys['ArrowRight'],
    fire: keys['Space'], bomb: keys['KeyZ']
  };
}
function getP2Input() {
  return {
    up: keys['KeyW'], down: keys['KeyS'],
    left: keys['KeyA'], right: keys['KeyD'],
    fire: keys['KeyX'], bomb: keys['Enter']
  };
}

// ============================================================
// MAP GENERATION
// ============================================================
function generateMap(level) {
  // . = ground, # = brick, @ = steel, ~ = water, * = forest
  const map = [];
  for (let r = 0; r < MAP_ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < MAP_COLS; c++) {
      map[r][c] = '.';
    }
  }

  const seed = level * 7 + 13;
  function pseudoRand(x, y) {
    return ((x * 31 + y * 37 + seed * 53) % 100);
  }

  for (let r = 2; r < MAP_ROWS - 2; r++) {
    for (let c = 2; c < MAP_COLS - 2; c++) {
      const v = pseudoRand(r, c);
      if (v < 12 + level) map[r][c] = '#';
      else if (v < 15 + level / 2) map[r][c] = '@';
      else if (v < 18) map[r][c] = '~';
      else if (v < 24) map[r][c] = '*';
    }
  }

  // Clear spawn areas
  // Player spawn bottom-center
  for (let r = MAP_ROWS - 3; r < MAP_ROWS; r++)
    for (let c = MAP_COLS/2 - 3; c < MAP_COLS/2 + 3; c++)
      if (r >= 0 && c >= 0 && c < MAP_COLS) map[r][c] = '.';

  // Enemy spawn top corners and center
  const spawnCols = [2, MAP_COLS/2, MAP_COLS - 3];
  spawnCols.forEach(sc => {
    for (let r = 0; r < 3; r++)
      for (let c = Math.floor(sc) - 1; c <= Math.floor(sc) + 1; c++)
        if (c >= 0 && c < MAP_COLS) map[r][c] = '.';
  });

  return map;
}

// ============================================================
// GAME STATE
// ============================================================
let gameState = 'menu'; // menu, playing, gameover, levelcomplete, victory
let gameMode = 'single';
let currentLevel = 1;
let tileMap = [];
let players = [];
let enemies = [];
let bullets = [];
let powerUps = [];
let explosions = [];
let particles = [];
let enemiesRemaining = 0;
let enemiesSpawned = 0;
let spawnTimer = 0;
let levelTimer = 0;
let globalSlowMult = 1;
let globalSlowTimer = 0;
let score = 0;
let frameCount = 0;
let bossActive = false;
let shakeTimer = 0;
let messageText = '';
let messageTimer = 0;

// ============================================================
// ENTITY CLASSES
// ============================================================

class Tank {
  constructor(x, y, color, isPlayer, playerIndex) {
    this.x = x; this.y = y;
    this.color = color;
    this.isPlayer = isPlayer;
    this.playerIndex = playerIndex || 0;
    this.dir = 0; // 0=up,1=right,2=down,3=left
    this.speed = isPlayer ? 1.5 : 0.8;
    this.hp = 1;
    this.maxHp = 1;
    this.lives = isPlayer ? 3 : 0;
    this.fireLevel = 1;
    this.fireCooldown = 0;
    this.shieldTimer = 0;
    this.alive = true;
    this.respawnTimer = 0;
    this.w = 14; this.h = 14;
    this.aiType = 'patrol';
    this.aiTimer = 0;
    this.aiDir = 0;
    this.enemyType = 'light';
    this.scoreValue = 100;
    this.invincibleTimer = isPlayer ? 90 : 0; // brief spawn invincibility
    this.bombCount = isPlayer ? 1 : 0;
    this.isBoss = false;
    this.bossPhase = 0;
    this.bossAttackTimer = 0;
    this.isTurret = false;
  }

  update(dt) {
    if (!this.alive) {
      if (this.isPlayer && this.lives > 0) {
        this.respawnTimer--;
        if (this.respawnTimer <= 0) {
          this.respawn();
        }
      }
      return;
    }

    if (this.shieldTimer > 0) this.shieldTimer--;
    if (this.invincibleTimer > 0) this.invincibleTimer--;
    if (this.fireCooldown > 0) this.fireCooldown--;

    if (this.isPlayer) {
      this.handlePlayerInput();
    } else if (this.isTurret) {
      this.handleTurretAI();
    } else if (this.isBoss) {
      this.handleBossAI();
    } else {
      this.handleEnemyAI();
    }
  }

  handlePlayerInput() {
    const input = this.playerIndex === 0 ? getP1Input() : getP2Input();
    let dx = 0, dy = 0;
    if (input.up) { dy = -1; this.dir = 0; }
    else if (input.down) { dy = 1; this.dir = 2; }
    else if (input.left) { dx = -1; this.dir = 3; }
    else if (input.right) { dx = 1; this.dir = 1; }

    if (dx !== 0 || dy !== 0) {
      this.tryMove(dx * this.speed, dy * this.speed);
    }

    if (input.fire && this.fireCooldown <= 0) {
      this.fire();
    }

    if (input.bomb && this.bombCount > 0) {
      keys[this.playerIndex === 0 ? 'KeyZ' : 'Enter'] = false;
      this.useBomb();
    }
  }

  handleEnemyAI() {
    const spd = this.speed * globalSlowMult;
    this.aiTimer--;

    if (this.aiType === 'patrol') {
      if (this.aiTimer <= 0) {
        this.aiDir = Math.floor(Math.random() * 4);
        this.aiTimer = 60 + Math.floor(Math.random() * 120);
      }
      const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      const d = dirs[this.aiDir];
      this.dir = this.aiDir;
      if (!this.tryMove(d[0] * spd, d[1] * spd)) {
        this.aiDir = Math.floor(Math.random() * 4);
        this.aiTimer = 30;
      }
    } else if (this.aiType === 'pursuit') {
      // Find nearest player
      let nearest = null, minDist = Infinity;
      players.forEach(p => {
        if (p.alive) {
          const dist = Math.abs(p.x - this.x) + Math.abs(p.y - this.y);
          if (dist < minDist) { minDist = dist; nearest = p; }
        }
      });
      if (nearest) {
        const dx = nearest.x - this.x;
        const dy = nearest.y - this.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          this.dir = dx > 0 ? 1 : 3;
        } else {
          this.dir = dy > 0 ? 2 : 0;
        }
      }
      if (this.aiTimer <= 0) {
        this.aiTimer = 20;
        if (Math.random() < 0.2) {
          this.aiDir = Math.floor(Math.random() * 4);
          this.dir = this.aiDir;
        }
      }
      const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
      const d = dirs[this.dir];
      if (!this.tryMove(d[0] * spd, d[1] * spd)) {
        this.dir = Math.floor(Math.random() * 4);
      }
    } else { // mixed
      if (this.aiTimer <= 0) {
        this.aiTimer = 40 + Math.floor(Math.random() * 80);
        if (Math.random() < 0.5) {
          this.aiType = 'patrol';
        } else {
          this.aiType = 'pursuit';
        }
      }
      this.handleEnemyAI();
      return;
    }

    // Fire occasionally
    if (this.fireCooldown <= 0 && Math.random() < 0.03) {
      this.fire();
    }
  }

  handleTurretAI() {
    this.aiTimer--;
    if (this.aiTimer <= 0) {
      // Aim at nearest player
      let nearest = null, minDist = Infinity;
      players.forEach(p => {
        if (p.alive) {
          const dist = Math.abs(p.x - this.x) + Math.abs(p.y - this.y);
          if (dist < minDist) { minDist = dist; nearest = p; }
        }
      });
      if (nearest) {
        const dx = nearest.x - this.x;
        const dy = nearest.y - this.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          this.dir = dx > 0 ? 1 : 3;
        } else {
          this.dir = dy > 0 ? 2 : 0;
        }
      }
      this.fire();
      this.aiTimer = 60 + Math.floor(Math.random() * 60);
    }
  }

  handleBossAI() {
    const spd = this.speed * globalSlowMult;
    this.bossAttackTimer--;
    this.aiTimer--;

    if (this.aiTimer <= 0) {
      this.aiDir = Math.floor(Math.random() * 4);
      this.aiTimer = 40 + Math.floor(Math.random() * 60);
    }

    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    const d = dirs[this.aiDir];
    this.dir = this.aiDir;
    this.tryMove(d[0] * spd, d[1] * spd);

    if (this.bossAttackTimer <= 0) {
      this.bossAttackTimer = 30 + Math.floor(Math.random() * 30);

      if (this.enemyType === 'sandworm') {
        // Fan attack: fire 3 directions
        for (let i = -1; i <= 1; i++) {
          const bDir = (this.dir + i + 4) % 4;
          this.fireInDir(bDir);
        }
        sfxBoss();
      } else {
        // Super tank: bombardment
        for (let i = 0; i < 4; i++) {
          this.fireInDir(i);
        }
        sfxBoss();
        shakeTimer = 10;
      }
    }
  }

  tryMove(dx, dy) {
    const nx = this.x + dx;
    const ny = this.y + dy;

    // Bounds
    if (nx < 0 || nx + this.w > MAP_COLS * TILE_SIZE ||
        ny < 0 || ny + this.h > MAP_ROWS * TILE_SIZE) return false;

    // Tile collision
    const startCol = Math.floor(nx / TILE_SIZE);
    const endCol = Math.floor((nx + this.w - 1) / TILE_SIZE);
    const startRow = Math.floor(ny / TILE_SIZE);
    const endRow = Math.floor((ny + this.h - 1) / TILE_SIZE);

    for (let r = startRow; r <= endRow; r++) {
      for (let c = startCol; c <= endCol; c++) {
        if (r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS) {
          const tile = tileMap[r][c];
          if (tile === '#' || tile === '@' || tile === '~') return false;
        }
      }
    }

    // Tank-tank collision
    const allTanks = [...players, ...enemies];
    for (const t of allTanks) {
      if (t === this || !t.alive) continue;
      if (nx < t.x + t.w && nx + this.w > t.x &&
          ny < t.y + t.h && ny + this.h > t.y) return false;
    }

    this.x = nx;
    this.y = ny;
    return true;
  }

  fire() {
    const maxBullets = this.isPlayer ? (3 + this.fireLevel * 2) : 2;
    const myBullets = bullets.filter(b => b.owner === this);
    if (myBullets.length >= maxBullets) return;

    this.fireCooldown = this.isPlayer ? 12 : 30;
    this.fireInDir(this.dir);
    if (this.isPlayer) sfxShoot();

    // Burst fire for higher levels
    if (this.isPlayer && this.fireLevel >= 2) {
      setTimeout(() => {
        if (this.alive) this.fireInDir(this.dir);
      }, 100);
    }
    if (this.isPlayer && this.fireLevel >= 3) {
      setTimeout(() => {
        if (this.alive) this.fireInDir(this.dir);
      }, 200);
    }
  }

  fireInDir(dir) {
    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    const d = dirs[dir];
    const bx = this.x + this.w / 2 - 2 + d[0] * 8;
    const by = this.y + this.h / 2 - 2 + d[1] * 8;
    bullets.push(new Bullet(bx, by, dir, this));
  }

  useBomb() {
    this.bombCount--;
    sfxBomb();
    showMessage('💥 BOMB!');
    // Kill all enemies on screen
    enemies.forEach(e => {
      if (e.alive) {
        e.hp = 0;
        e.die();
        score += e.scoreValue;
      }
    });
    shakeTimer = 20;
    // Big explosion particles everywhere
    for (let i = 0; i < 15; i++) {
      explosions.push(new Explosion(
        Math.random() * MAP_COLS * TILE_SIZE,
        Math.random() * MAP_ROWS * TILE_SIZE,
        true
      ));
    }
  }

  hit() {
    if (this.shieldTimer > 0 || this.invincibleTimer > 0) return;
    this.hp--;
    sfxHit();
    if (this.hp <= 0) {
      this.die();
    }
  }

  die() {
    this.alive = false;
    explosions.push(new Explosion(this.x, this.y, this.isBoss));
    sfxExplosion();
    if (this.isBoss) shakeTimer = 30;

    if (this.isPlayer) {
      this.lives--;
      if (this.lives > 0) {
        this.respawnTimer = 90;
      }
    }
  }

  respawn() {
    this.alive = true;
    this.hp = this.maxHp;
    this.invincibleTimer = 120;
    this.fireLevel = 1;
    const sx = this.playerIndex === 0 ?
      (MAP_COLS / 2 - 2) * TILE_SIZE :
      (MAP_COLS / 2 + 2) * TILE_SIZE;
    this.x = sx;
    this.y = (MAP_ROWS - 2) * TILE_SIZE;
  }

  draw() {
    if (!this.alive) return;
    const sx = this.x, sy = this.y + MAP_OFFSET_Y;

    // Shield effect
    if (this.shieldTimer > 0) {
      ctx.strokeStyle = COLORS.shield;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + 0.3 * Math.sin(frameCount * 0.2);
      ctx.beginPath();
      ctx.arc(sx + this.w/2, sy + this.h/2, this.w/2 + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Invincibility flash
    if (this.invincibleTimer > 0 && frameCount % 6 < 3) return;

    // Body
    ctx.fillStyle = this.color;
    const bx = sx + 2, by = sy + 2, bw = this.w - 4, bh = this.h - 4;
    ctx.fillRect(bx, by, bw, bh);

    // Barrel
    ctx.fillStyle = this.color;
    const cx = sx + this.w / 2, cy = sy + this.h / 2;
    const barrelLen = this.isBoss ? 10 : 7;
    const barrelW = this.isBoss ? 4 : 2;
    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    const d = dirs[this.dir];
    ctx.fillRect(
      cx - barrelW/2 + d[0] * 4, cy - barrelW/2 + d[1] * 4,
      Math.abs(d[0]) ? barrelLen * d[0] : barrelW,
      Math.abs(d[1]) ? barrelLen * d[1] : barrelW
    );

    // Treads
    ctx.fillStyle = '#555';
    if (this.dir === 0 || this.dir === 2) {
      ctx.fillRect(sx, sy, 2, this.h);
      ctx.fillRect(sx + this.w - 2, sy, 2, this.h);
    } else {
      ctx.fillRect(sx, sy, this.w, 2);
      ctx.fillRect(sx, sy + this.h - 2, this.w, 2);
    }

    // Boss HP bar
    if (this.isBoss && !this.isPlayer) {
      ctx.fillStyle = '#600';
      ctx.fillRect(sx - 4, sy - 6, this.w + 8, 4);
      ctx.fillStyle = '#f00';
      ctx.fillRect(sx - 4, sy - 6, (this.w + 8) * (this.hp / this.maxHp), 4);
    }

    // Turret marker
    if (this.isTurret) {
      ctx.fillStyle = '#ff0';
      ctx.fillRect(sx + 5, sy + 5, 4, 4);
    }
  }
}

class Bullet {
  constructor(x, y, dir, owner) {
    this.x = x; this.y = y;
    this.dir = dir;
    this.owner = owner;
    this.speed = owner.isPlayer ? 4 : 2.5;
    this.alive = true;
    this.w = 4; this.h = 4;
    this.power = owner.isPlayer ? owner.fireLevel : 1;
  }

  update() {
    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    const d = dirs[this.dir];
    this.x += d[0] * this.speed;
    this.y += d[1] * this.speed;

    // Bounds
    if (this.x < -4 || this.x > MAP_COLS * TILE_SIZE + 4 ||
        this.y < -4 || this.y > MAP_ROWS * TILE_SIZE + 4) {
      this.alive = false;
      return;
    }

    // Tile collision
    const col = Math.floor((this.x + 2) / TILE_SIZE);
    const row = Math.floor((this.y + 2) / TILE_SIZE);
    if (row >= 0 && row < MAP_ROWS && col >= 0 && col < MAP_COLS) {
      const tile = tileMap[row][col];
      if (tile === '#') {
        tileMap[row][col] = '.';
        this.alive = false;
        particles.push({ x: col * TILE_SIZE + 8, y: row * TILE_SIZE + 8, life: 10, color: '#f80' });
        return;
      }
      if (tile === '@') {
        if (this.power >= 3) {
          tileMap[row][col] = '.';
        }
        this.alive = false;
        particles.push({ x: col * TILE_SIZE + 8, y: row * TILE_SIZE + 8, life: 10, color: '#aaa' });
        return;
      }
    }

    // Hit tanks
    const targets = this.owner.isPlayer ? enemies :
      (gameMode === 'versus' ? [...players, ...enemies] : players);

    for (const t of targets) {
      if (!t.alive || t === this.owner) continue;
      if (this.x < t.x + t.w && this.x + this.w > t.x &&
          this.y < t.y + t.h && this.y + this.h > t.y) {
        t.hit();
        this.alive = false;
        if (!t.alive && this.owner.isPlayer) {
          score += t.scoreValue;
          // Chance to drop power-up
          if (Math.random() < 0.2) {
            spawnPowerUp(t.x, t.y);
          }
        }
        return;
      }
    }

    // Bullet vs bullet collision
    for (const b of bullets) {
      if (b === this || !b.alive) continue;
      if (Math.abs(this.x - b.x) < 4 && Math.abs(this.y - b.y) < 4) {
        this.alive = false;
        b.alive = false;
        return;
      }
    }
  }

  draw() {
    if (!this.alive) return;
    ctx.fillStyle = COLORS.bullet;
    ctx.fillRect(this.x, this.y + MAP_OFFSET_Y, this.w, this.h);
  }
}

class Explosion {
  constructor(x, y, big) {
    this.x = x; this.y = y;
    this.big = big;
    this.frame = 0;
    this.maxFrame = big ? 30 : 16;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrame) this.alive = false;
  }

  draw() {
    const t = this.frame / this.maxFrame;
    const r = this.big ? 12 + t * 20 : 6 + t * 10;
    const colorIdx = Math.min(3, Math.floor(t * 4));
    ctx.fillStyle = COLORS.explosion[colorIdx];
    ctx.globalAlpha = 1 - t;
    ctx.beginPath();
    ctx.arc(this.x + 7, this.y + 7 + MAP_OFFSET_Y, r, 0, Math.PI * 2);
    ctx.fill();

    // Extra fragments
    if (this.big) {
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + this.frame * 0.1;
        const dist = r * 0.8;
        ctx.fillRect(
          this.x + 7 + Math.cos(angle) * dist - 2,
          this.y + 7 + MAP_OFFSET_Y + Math.sin(angle) * dist - 2,
          4, 4
        );
      }
    }
    ctx.globalAlpha = 1;
  }
}

class PowerUp {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type; // 'bomb','shield','star','life','parachute'
    this.alive = true;
    this.timer = 600; // 10 seconds
    this.w = 12; this.h = 12;
  }

  update() {
    this.timer--;
    if (this.timer <= 0) this.alive = false;

    // Check collection by players
    players.forEach(p => {
      if (!p.alive) return;
      if (this.x < p.x + p.w && this.x + this.w > p.x &&
          this.y < p.y + p.h && this.y + this.h > p.y) {
        this.collect(p);
        this.alive = false;
      }
    });
  }

  collect(player) {
    sfxPowerUp();
    score += 50;
    switch (this.type) {
      case 'bomb':
        player.bombCount++;
        showMessage('BOMB +1');
        break;
      case 'shield':
        player.shieldTimer = 300;
        showMessage('SHIELD!');
        break;
      case 'star':
        player.fireLevel = Math.min(3, player.fireLevel + 1);
        showMessage('FIRE LV' + player.fireLevel);
        break;
      case 'life':
        player.lives = Math.min(5, player.lives + 1);
        showMessage('LIFE +1');
        break;
      case 'parachute':
        globalSlowTimer = 300;
        globalSlowMult = 0.4;
        showMessage('SLOW DOWN!');
        break;
    }
  }

  draw() {
    if (!this.alive) return;
    if (this.timer < 120 && frameCount % 10 < 5) return; // flash when expiring

    const sx = this.x, sy = this.y + MAP_OFFSET_Y;
    ctx.fillStyle = '#222';
    ctx.fillRect(sx - 1, sy - 1, this.w + 2, this.h + 2);

    const colors = {
      bomb: '#f44', shield: '#44f', star: '#ff0', life: '#0f0', parachute: '#0ff'
    };
    ctx.fillStyle = colors[this.type] || '#fff';
    ctx.fillRect(sx, sy, this.w, this.h);

    // Icon
    ctx.fillStyle = '#000';
    ctx.font = '9px monospace';
    const icons = { bomb: 'B', shield: 'S', star: '★', life: '♥', parachute: 'P' };
    ctx.fillText(icons[this.type] || '?', sx + 2, sy + 9);
  }
}

// ============================================================
// HELPER FUNCTIONS
// ============================================================

function showMessage(text) {
  messageText = text;
  messageTimer = 90;
}

function spawnPowerUp(x, y) {
  const types = ['bomb', 'shield', 'star', 'life', 'parachute'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerUps.push(new PowerUp(x, y, type));
}

function getEnemyCountForLevel(level) {
  return Math.min(40, 8 + level * 1.6) | 0;
}

function getMaxEnemiesOnScreen(level) {
  return Math.min(8, 3 + Math.floor(level / 3));
}

function isBossLevel(level) {
  return level === 10 || level === 20;
}

function spawnEnemy() {
  if (enemiesSpawned >= enemiesRemaining) return;

  const maxOnScreen = getMaxEnemiesOnScreen(currentLevel);
  const aliveCount = enemies.filter(e => e.alive).length;
  if (aliveCount >= maxOnScreen) return;

  const spawnCols = [2, Math.floor(MAP_COLS / 2), MAP_COLS - 3];
  const sc = spawnCols[enemiesSpawned % 3];
  const sx = sc * TILE_SIZE;
  const sy = 0;

  // Check for obstacles at spawn
  let blocked = false;
  [...players, ...enemies].forEach(t => {
    if (t.alive && Math.abs(t.x - sx) < 20 && Math.abs(t.y - sy) < 20) blocked = true;
  });
  if (blocked) return;

  let tank;
  const roll = Math.random();
  const levelFactor = currentLevel / 20;

  // Turret from level 12
  if (currentLevel >= 12 && roll < 0.15) {
    tank = new Tank(sx, sy, COLORS.turret, false);
    tank.isTurret = true;
    tank.hp = 2; tank.maxHp = 2;
    tank.scoreValue = 200;
    tank.speed = 0;
    tank.aiTimer = 60;
    tank.w = 14; tank.h = 14;
  } else if (roll < 0.4 - levelFactor * 0.2) {
    // Light
    tank = new Tank(sx, sy, COLORS.enemyLight, false);
    tank.hp = 1; tank.maxHp = 1;
    tank.speed = 1.0 + levelFactor * 0.3;
    tank.aiType = 'patrol';
    tank.enemyType = 'light';
    tank.scoreValue = 100;
  } else if (roll < 0.75 - levelFactor * 0.1) {
    // Medium
    tank = new Tank(sx, sy, COLORS.enemyMedium, false);
    tank.hp = 2; tank.maxHp = 2;
    tank.speed = 0.8 + levelFactor * 0.3;
    tank.aiType = 'pursuit';
    tank.enemyType = 'medium';
    tank.scoreValue = 200;
  } else {
    // Heavy
    tank = new Tank(sx, sy, COLORS.enemyHeavy, false);
    tank.hp = 3; tank.maxHp = 3;
    tank.speed = 0.6 + levelFactor * 0.2;
    tank.aiType = 'mixed';
    tank.enemyType = 'heavy';
    tank.scoreValue = 300;
  }

  enemies.push(tank);
  enemiesSpawned++;
}

function spawnBoss() {
  bossActive = true;
  const sx = (MAP_COLS / 2 - 1) * TILE_SIZE;

  let boss;
  if (currentLevel === 10) {
    boss = new Tank(sx, TILE_SIZE, COLORS.boss, false);
    boss.isBoss = true;
    boss.enemyType = 'sandworm';
    boss.hp = 30; boss.maxHp = 30;
    boss.speed = 0.6;
    boss.w = 24; boss.h = 24;
    boss.scoreValue = 2000;
    boss.bossAttackTimer = 60;
    showMessage('BOSS: SAND WORM!');
  } else {
    boss = new Tank(sx, TILE_SIZE, '#fff', false);
    boss.isBoss = true;
    boss.enemyType = 'supertank';
    boss.hp = 50; boss.maxHp = 50;
    boss.speed = 0.4;
    boss.w = 28; boss.h = 28;
    boss.scoreValue = 5000;
    boss.bossAttackTimer = 40;
    boss.color = '#e0e0ff';
    showMessage('FINAL BOSS: SUPER TANK!');
  }

  enemies.push(boss);
  sfxBoss();
}

// ============================================================
// LEVEL MANAGEMENT
// ============================================================

function initLevel(level) {
  currentLevel = level;
  tileMap = generateMap(level);
  enemies = [];
  bullets = [];
  powerUps = [];
  explosions = [];
  particles = [];
  enemiesRemaining = getEnemyCountForLevel(level);
  enemiesSpawned = 0;
  spawnTimer = 0;
  levelTimer = 0;
  globalSlowMult = 1;
  globalSlowTimer = 0;
  bossActive = false;
  shakeTimer = 0;

  const chapter = level <= 10 ? 1 : 2;
  showMessage(`LEVEL ${level} - CHAPTER ${chapter}`);

  // Reset / position players
  players.forEach((p, i) => {
    const sx = i === 0 ?
      (Math.floor(MAP_COLS / 2) - 2) * TILE_SIZE :
      (Math.floor(MAP_COLS / 2) + 2) * TILE_SIZE;
    p.x = sx;
    p.y = (MAP_ROWS - 2) * TILE_SIZE;
    p.alive = true;
    p.hp = 1; p.maxHp = 1;
    p.invincibleTimer = 120;
    p.dir = 0;
    p.shieldTimer = 0;
  });

  sfxLevelUp();
}

function checkLevelComplete() {
  if (bossActive) {
    const bossAlive = enemies.some(e => e.alive && e.isBoss);
    if (!bossAlive) {
      return true;
    }
    return false;
  }

  const allSpawned = enemiesSpawned >= enemiesRemaining;
  const allDead = enemies.every(e => !e.alive);
  return allSpawned && allDead;
}

function checkGameOver() {
  return players.every(p => !p.alive && p.lives <= 0);
}

// ============================================================
// GAME INITIALIZATION
// ============================================================

function startGame(mode) {
  initAudio();
  gameMode = mode;
  score = 0;
  currentLevel = 1;
  players = [];

  const p1 = new Tank(0, 0, COLORS.player1, true, 0);
  p1.lives = 3;
  players.push(p1);

  if (mode === 'coop' || mode === 'versus') {
    const p2 = new Tank(0, 0, COLORS.player2, true, 1);
    p2.lives = 3;
    players.push(p2);
  }

  document.getElementById('menu').style.display = 'none';
  gameState = 'playing';
  initLevel(currentLevel);
}

// ============================================================
// DRAWING
// ============================================================

function drawTileMap() {
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      const tile = tileMap[r][c];
      const tx = c * TILE_SIZE;
      const ty = r * TILE_SIZE + MAP_OFFSET_Y;

      switch (tile) {
        case '.':
          ctx.fillStyle = COLORS.ground;
          ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
          break;
        case '#':
          ctx.fillStyle = COLORS.brick;
          ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
          // Brick pattern
          ctx.fillStyle = '#8a2010';
          ctx.fillRect(tx, ty + TILE_SIZE / 2, TILE_SIZE, 1);
          ctx.fillRect(tx + TILE_SIZE / 2, ty, 1, TILE_SIZE);
          break;
        case '@':
          ctx.fillStyle = COLORS.steel;
          ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = '#999';
          ctx.fillRect(tx + 2, ty + 2, TILE_SIZE - 4, TILE_SIZE - 4);
          break;
        case '~':
          ctx.fillStyle = COLORS.water;
          ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
          // Water ripple
          ctx.fillStyle = '#5070d4';
          const waveOff = Math.sin((frameCount + c * 5) * 0.08) * 2;
          ctx.fillRect(tx + 2, ty + 6 + waveOff, TILE_SIZE - 4, 2);
          break;
        case '*':
          ctx.fillStyle = COLORS.ground;
          ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
          ctx.fillStyle = COLORS.forest;
          // Tree pattern
          ctx.fillRect(tx + 2, ty + 2, 5, 5);
          ctx.fillRect(tx + 8, ty + 6, 6, 6);
          ctx.fillRect(tx + 3, ty + 9, 5, 5);
          break;
      }
    }
  }
}

function drawForestOverlay() {
  // Draw forest tiles OVER entities for cover effect
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      if (tileMap[r][c] === '*') {
        const tx = c * TILE_SIZE;
        const ty = r * TILE_SIZE + MAP_OFFSET_Y;
        ctx.fillStyle = COLORS.forest;
        ctx.globalAlpha = 0.6;
        ctx.fillRect(tx + 1, ty + 1, TILE_SIZE - 2, TILE_SIZE - 2);
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawHUD() {
  ctx.fillStyle = COLORS.hudBg;
  ctx.fillRect(0, 0, NES_W, MAP_OFFSET_Y);

  ctx.fillStyle = COLORS.hud;
  ctx.font = '12px monospace';

  // Level
  const chapter = currentLevel <= 10 ? 'CH1' : 'CH2';
  ctx.fillText(`${chapter} LV:${currentLevel}`, 4, 16);

  // Score
  ctx.fillText(`SCORE:${score}`, 120, 16);

  // High score
  ctx.fillText(`HI:${savedData.highScore}`, 240, 16);

  // Player info
  players.forEach((p, i) => {
    const px = 340 + i * 80;
    ctx.fillStyle = p.color;
    ctx.fillText(`P${i+1}`, px, 10);
    ctx.fillStyle = '#f00';
    let hearts = '';
    for (let h = 0; h < p.lives; h++) hearts += '♥';
    ctx.fillText(hearts, px, 20);

    // Fire level indicator
    ctx.fillStyle = '#ff0';
    ctx.fillText('★'.repeat(p.fireLevel), px + 30, 10);

    // Bomb count
    if (p.bombCount > 0) {
      ctx.fillStyle = '#f88';
      ctx.fillText(`B:${p.bombCount}`, px + 30, 20);
    }
  });

  // Enemies remaining
  const remaining = enemiesRemaining - enemiesSpawned + enemies.filter(e => e.alive).length;
  ctx.fillStyle = '#f44';
  ctx.fillText(`EN:${remaining}`, 460, 10);

  // Slow indicator
  if (globalSlowTimer > 0) {
    ctx.fillStyle = '#0ff';
    ctx.fillText('SLOW', 460, 20);
  }
}

function drawMessage() {
  if (messageTimer > 0) {
    messageTimer--;
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(NES_W / 2 - 80, NES_H / 2 - 15, 160, 30);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ff0';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(messageText, NES_W / 2, NES_H / 2 + 5);
    ctx.textAlign = 'left';
  }
}

function drawGameOver() {
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.8;
  ctx.fillRect(0, 0, NES_W, NES_H);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#f00';
  ctx.font = '28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', NES_W / 2, NES_H / 2 - 20);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(`FINAL SCORE: ${score}`, NES_W / 2, NES_H / 2 + 15);
  ctx.fillText(`HIGH SCORE: ${savedData.highScore}`, NES_W / 2, NES_H / 2 + 35);
  ctx.fillText('Press SPACE to return to menu', NES_W / 2, NES_H / 2 + 65);
  ctx.textAlign = 'left';
}

function drawVictory() {
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.8;
  ctx.fillRect(0, 0, NES_W, NES_H);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#ff0';
  ctx.font = '24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🎉 VICTORY! 🎉', NES_W / 2, NES_H / 2 - 30);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(`FINAL SCORE: ${score}`, NES_W / 2, NES_H / 2 + 5);
  ctx.fillText(`HIGH SCORE: ${savedData.highScore}`, NES_W / 2, NES_H / 2 + 25);
  ctx.fillText('You conquered all 20 levels!', NES_W / 2, NES_H / 2 + 50);
  ctx.fillText('Press SPACE to return to menu', NES_W / 2, NES_H / 2 + 75);
  ctx.textAlign = 'left';
}

function drawLevelComplete() {
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.7;
  ctx.fillRect(NES_W / 2 - 100, NES_H / 2 - 40, 200, 80);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#0f0';
  ctx.font = '18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL CLEAR!', NES_W / 2, NES_H / 2 - 10);

  ctx.fillStyle = '#ff0';
  ctx.font = '12px monospace';
  const bonus = currentLevel * 100;
  ctx.fillText(`Survival Bonus: +${bonus}`, NES_W / 2, NES_H / 2 + 15);
  ctx.textAlign = 'left';
}

// ============================================================
// GAME LOOP
// ============================================================

let levelCompleteTimer = 0;

function update() {
  frameCount++;

  if (gameState === 'gameover' || gameState === 'victory') {
    if (keys['Space']) {
      keys['Space'] = false;
      gameState = 'menu';
      document.getElementById('menu').style.display = 'flex';
    }
    return;
  }

  if (gameState === 'levelcomplete') {
    levelCompleteTimer--;
    if (levelCompleteTimer <= 0) {
      if (currentLevel >= 20) {
        gameState = 'victory';
        // Save
        if (score > savedData.highScore) savedData.highScore = score;
        savedData.maxLevel = Math.max(savedData.maxLevel, currentLevel);
        saveData(savedData);
      } else {
        currentLevel++;
        initLevel(currentLevel);
        gameState = 'playing';
      }
    }
    return;
  }

  if (gameState !== 'playing') return;

  levelTimer++;

  // Global slow
  if (globalSlowTimer > 0) {
    globalSlowTimer--;
    if (globalSlowTimer <= 0) globalSlowMult = 1;
  }

  // Shake decay
  if (shakeTimer > 0) shakeTimer--;

  // Spawn enemies
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnTimer = Math.max(30, 120 - currentLevel * 4);

    if (isBossLevel(currentLevel) && !bossActive && enemiesSpawned >= enemiesRemaining) {
      const normalAlive = enemies.filter(e => e.alive && !e.isBoss).length;
      if (normalAlive === 0) {
        spawnBoss();
      }
    } else if (!bossActive) {
      spawnEnemy();
    }
  }

  // Update entities
  players.forEach(p => p.update());
  enemies.forEach(e => e.update());
  bullets.forEach(b => b.update());
  powerUps.forEach(p => p.update());
  explosions.forEach(e => e.update());
  particles.forEach(p => { p.life--; });

  // Cleanup
  bullets = bullets.filter(b => b.alive);
  powerUps = powerUps.filter(p => p.alive);
  explosions = explosions.filter(e => e.alive);
  particles = particles.filter(p => p.life > 0);

  // Check game over
  if (checkGameOver()) {
    gameState = 'gameover';
    if (score > savedData.highScore) savedData.highScore = score;
    savedData.maxLevel = Math.max(savedData.maxLevel, currentLevel);
    saveData(savedData);
    return;
  }

  // Check level complete
  if (checkLevelComplete()) {
    gameState = 'levelcomplete';
    levelCompleteTimer = 120;
    const bonus = currentLevel * 100;
    score += bonus;
    if (score > savedData.highScore) savedData.highScore = score;
    savedData.maxLevel = Math.max(savedData.maxLevel, currentLevel);
    saveData(savedData);
    sfxLevelUp();
  }

  // Versus mode: check if one player is dead
  if (gameMode === 'versus') {
    const alive = players.filter(p => p.alive || p.lives > 0);
    if (alive.length <= 1 && levelTimer > 60) {
      gameState = 'gameover';
      if (alive.length === 1) {
        showMessage(`PLAYER ${alive[0].playerIndex + 1} WINS!`);
      }
    }
  }
}

function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeTimer * 0.5;
    const sy = (Math.random() - 0.5) * shakeTimer * 0.5;
    ctx.translate(sx, sy);
  }

  // Clear
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, NES_W, NES_H);

  if (gameState === 'menu') {
    ctx.restore();
    return;
  }

  // Draw map
  drawTileMap();

  // Draw power-ups
  powerUps.forEach(p => p.draw());

  // Draw tanks
  enemies.forEach(e => e.draw());
  players.forEach(p => p.draw());

  // Forest overlay (drawn over entities)
  drawForestOverlay();

  // Draw bullets
  bullets.forEach(b => b.draw());

  // Draw explosions
  explosions.forEach(e => e.draw());

  // Draw particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 10;
    ctx.fillRect(p.x - 2, p.y - 2 + MAP_OFFSET_Y, 4, 4);
    ctx.globalAlpha = 1;
  });

  // HUD
  drawHUD();

  // Messages
  drawMessage();

  // State overlays
  if (gameState === 'levelcomplete') drawLevelComplete();
  if (gameState === 'gameover') drawGameOver();
  if (gameState === 'victory') drawVictory();

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
